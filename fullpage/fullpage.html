<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NINA School - Vollansicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fullpage.css">
</head>
<body>
  <div class="fullpage-container">
    <!-- Sidebar -->
    <aside class="fullpage-sidebar">
      <div class="sidebar-brand">
        <div class="logo-small">
          <svg viewBox="0 0 24 24"><path d="M12 2L1 8l11 6 9-4.91V16h2V8L12 2z"/><path d="M22 12.47l-10 5.46-10-5.46V17l10 5.5 10-5.5v-4.53z"/></svg>
          NINA School
        </div>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Aktives Projekt</div>
        <select id="project-select-full"></select>
        <button id="add-project-btn-full" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Projekt erstellen
        </button>
        <button id="delete-project-btn-full" class="nav-btn danger" style="opacity: 0.3; pointer-events: none;">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Projekt löschen
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <nav class="nav-section">
        <div class="nav-label">Export</div>
        <button id="export-markdown-btn" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Markdown exportieren
        </button>
        <button id="copy-bib-btn" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Quellenverzeichnis kopieren
        </button>
        <button id="outline-btn" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M3 9h14V7H3v2zm0 4h14v-2H3v2zm0 4h14v-2H3v2zm16 0h2v-2h-2v2zm0-10v2h2V7h-2zm0 6h2v-2h-2v2z"/></svg>
          Gliederung exportieren
        </button>
      </nav>

      <div class="sidebar-spacer"></div>

      <nav class="nav-section">
        <button id="open-settings-btn-full" class="nav-btn">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.64l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.09-.47 0-.59.22L2.74 8.87c-.12.22-.07.49.12.64l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.64l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.64l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          Einstellungen
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="fullpage-main">
      <header class="fullpage-header">
        <div class="header-title">
          <h1>Alle Einträge</h1>
          <span id="header-count" class="header-count"></span>
        </div>
        <div class="header-controls">
          <button id="add-note-btn" class="ghost-btn" title="Eigene Notiz hinzufügen">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Notiz
          </button>
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-full" placeholder="Durchsuchen…">
          </div>
          <label class="scope-toggle" title="In allen Projekten suchen">
            <input type="checkbox" id="global-search">
            <span>Alle Projekte</span>
          </label>
          <select id="sort-select" class="sort-select" title="Sortierung">
            <option value="newest">Neueste zuerst</option>
            <option value="oldest">Älteste zuerst</option>
            <option value="manual">Eigene Reihenfolge</option>
          </select>
        </div>
      </header>

      <div class="content-area">
        <div id="highlights-container" class="highlights-grid"></div>
        <div id="empty-full" class="empty-state-full" style="display: none;">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2zm0 8H7v-2h10v2z"/></svg>
          <p>Keine Einträge gefunden</p>
        </div>

        <div id="pagination" class="pagination" style="display: none;">
          <button id="prev-page" class="pagination-btn">← Zurück</button>
          <div class="pagination-info">
            <span id="page-number">Seite 1</span>
            <span id="page-stats">0 von 0</span>
          </div>
          <button id="next-page" class="pagination-btn">Weiter →</button>
        </div>
      </div>
    </main>

    <!-- Project Form Modal -->
    <div id="project-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Neues Projekt</h2>
        <input type="text" id="project-name-input" placeholder="Projektname" maxlength="60">
        <div class="modal-actions">
          <button id="modal-cancel" class="btn secondary">Abbrechen</button>
          <button id="modal-save" class="btn primary">Erstellen</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/citations.js"></script>
  <script src="fullpage.js"></script>
</body>
</html>
