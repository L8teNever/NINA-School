<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NINA School - Vollansicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fullpage.css">
</head>
<body>
  <div class="fullpage-container">
    <!-- Sidebar -->
    <aside class="fullpage-sidebar">
      <div class="sidebar-header">
        <div class="logo-small">
          <svg viewBox="0 0 24 24"><path d="M12 2L1 8l11 6 9-4.91V16h2V8L12 2z"/><path d="M22 12.47l-10 5.46-10-5.46V17l10 5.5 10-5.5v-4.53z"/></svg>
          NINA
        </div>
      </div>

      <nav class="nav-section">
        <div class="nav-label">Projekt</div>
        <select id="project-select-full">
          <!-- Populated by JS -->
        </select>
      </nav>

      <nav class="nav-section">
        <button id="add-project-btn-full" class="nav-btn add-project">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Projekt erstellen
        </button>
        <button id="delete-project-btn-full" class="nav-btn delete-project" style="opacity: 0.3; pointer-events: none;">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Projekt löschen
        </button>
      </nav>

      <div class="sidebar-divider"></div>

      <nav class="nav-section">
        <button id="export-markdown-btn" class="nav-btn export">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Markdown Export
        </button>
        <button id="copy-bib-btn" class="nav-btn copy-bib">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Quellen kopieren
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="fullpage-main">
      <header class="fullpage-header">
        <h1>Alle Zitate</h1>
        <div class="header-controls">
          <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-full" placeholder="Suche...">
          </div>
          <button id="sort-btn-full" class="sort-btn">
            <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
          </button>
        </div>
      </header>

      <div class="content-area">
        <!-- Highlights will be rendered here -->
        <div id="highlights-container" class="highlights-grid"></div>
        <div id="empty-full" class="empty-state-full" style="display: none;">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2zm0 8H7v-2h10v2z"/></svg>
          <p>Keine Zitate gefunden</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination" style="display: none;">
          <button id="prev-page" class="pagination-btn">← Zurück</button>
          <div class="pagination-info">
            <span id="page-number">Seite 1</span>
            <span id="page-stats">0 von 0</span>
          </div>
          <button id="next-page" class="pagination-btn">Weiter →</button>
        </div>
      </div>
    </main>

    <!-- Project Form Modal -->
    <div id="project-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Neues Projekt</h2>
        <input type="text" id="project-name-input" placeholder="Projektname">
        <div class="modal-actions">
          <button id="modal-cancel" class="btn secondary">Abbrechen</button>
          <button id="modal-save" class="btn primary">Erstellen</button>
        </div>
      </div>
    </div>
  </div>

  <style>
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #4dd9d9;
      border: 1px solid #4dd9d9;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 10000;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }
    .toast-msg.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>

  <script src="fullpage.js"></script>
</body>
</html>
