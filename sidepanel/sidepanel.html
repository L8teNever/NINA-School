<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NINA School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidebar-container">
    <!-- Header -->
    <header class="sidebar-header">
      <div class="header-top">
        <div class="logo-section">
          <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L1 8l11 6 9-4.91V16h2V8L12 2z"/>
            <path d="M22 12.47l-10 5.46-10-5.46V17l10 5.5 10-5.5v-4.53z"/>
          </svg>
          <span class="logo-text">NINA</span>
        </div>
        <button id="open-fullpage-btn" class="fullpage-btn" title="Vollansicht öffnen">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
        </button>
      </div>

      <div class="project-badge-wrapper">
        <span class="project-badge-label">Projekt:</span>
        <span id="project-badge" class="project-badge">Standard</span>
      </div>
    </header>

    <!-- Sidebar File / Image Upload Bar -->
    <div class="sidebar-action-bar">
      <button id="upload-file-btn" class="upload-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
        </svg>
        Datei / Bild hinzufügen
      </button>
      <input type="file" id="sidebar-file-input" style="display: none;">
    </div>

    <!-- Main Content Area -->
    <main class="sidebar-main">
      <!-- Sources View -->
      <div id="sources-view" class="view-container active">
        <div id="sources-feed" class="feed"></div>
      </div>

      <!-- Details View (hidden initially) -->
      <div id="details-view" class="view-container">
        <div class="details-header">
          <button id="back-btn" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="details-info">
            <span id="details-domain" class="details-domain">Domain</span>
            <h2 id="details-title" class="details-title">Titel</h2>
          </div>
        </div>
        <div id="details-feed" class="feed"></div>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <svg viewBox="0 0 24 24">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2zm0 8H7v-2h10v2z"/>
        </svg>
        <p>Noch keine Zitate</p>
      </div>
    </main>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
